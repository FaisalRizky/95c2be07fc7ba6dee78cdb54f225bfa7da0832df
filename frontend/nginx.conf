server {
    listen 80;
    server_name localhost;

    # ── API reverse proxy ──────────────────────────────────────────────────
    # ${BACKEND_PORT} is substituted at container start by the official nginx
    # Docker image entrypoint (envsubst). Set BACKEND_PORT in .env / docker-compose.
    # The frontend JS uses the relative path /api/v1 — no port in the browser.
    location /api/ {
        proxy_pass         http://backend:${BACKEND_PORT}/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow streaming responses (export endpoint uses chunked transfer)
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

    # ── SPA routing ────────────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html index.htm;

        # Map all non-file requests to index.html for AngularJS html5Mode
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ───────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root       /usr/share/nginx/html;
        expires    1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 404 /index.html;
}
